name: resilience-patterns-lab

# The infra tier only. upstream.js and client.js run on the HOST (not in
# containers) so their behavior/config stays hand-editable; Prometheus
# reaches them via host.docker.internal.
services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: rpl-prometheus
    ports:
      - "9090:9090"          # UI/API: http://localhost:9090
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"   # no-op on Docker Desktop, needed on Linux

  grafana:
    image: grafana/grafana:11.3.0
    container_name: rpl-grafana
    ports:
      - "3000:3000"          # UI: http://localhost:3000
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"     # no login for the lab
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
