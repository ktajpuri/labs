services:
  postgres:
    build:
      context: .
      dockerfile_inline: |
        FROM postgres:16
        RUN apt-get update \
         && apt-get install -y --no-install-recommends util-linux-extra \
         && rm -rf /var/lib/apt/lists/*
    container_name: pagecache-lab-pg
    # privileged is required to drop the Linux page cache from inside the
    # container (writes to /proc/sys/vm/drop_caches on the Docker VM kernel).
    privileged: true
    environment:
      POSTGRES_USER: lab
      POSTGRES_PASSWORD: lab
      POSTGRES_DB: lab
    command: >
      postgres
      -c shared_buffers=128MB
      -c track_io_timing=on
    volumes:
      # Named volume = ext4 inside the Docker Linux VM, so page-cache
      # behavior is real Linux semantics (not macOS virtiofs).
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab -d lab"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  pgdata:
